<script>
// Email Accounts Management
const emailAccountsBtn = document.getElementById('emailAccountsBtn');
const emailAccountsSection = document.getElementById('emailAccountsSection');
const addAccountBtn = document.getElementById('addAccountBtn');
const emailAccountsList = document.getElementById('emailAccountsList');

// Toggle email accounts section
emailAccountsBtn.addEventListener('click', () => {
    if (emailAccountsSection.style.display === 'none') {
        emailAccountsSection.style.display = 'block';
        loadEmailAccounts();
    } else {
        emailAccountsSection.style.display = 'none';
    }
});

// Load email accounts
async function loadEmailAccounts() {
    try {
        const response = await fetch('/api/email-accounts/');
        const accounts = await response.json();
        
        if (accounts.length === 0) {
            emailAccountsList.innerHTML = `
                <div class="empty-state">
                    <div style="font-size: 60px; margin-bottom: 20px;">📧</div>
                    <h3>No Email Accounts Added</h3>
                    <p>Add your first email account to start sending emails</p>
                </div>
            `;
            return;
        }

        let html = '<div style="display: grid; gap: 15px;">';
        accounts.forEach(account => {
            const percentage = account.sent_today / account.daily_limit * 100;
            const progressColor = percentage > 80 ? '#ff6b6b' : percentage > 50 ? '#ffa500' : '#38ef7d';
            
            html += `
                <div style="background: white; border: 2px solid #e9ecef; border-radius: 10px; padding: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: start; margin-bottom: 15px;">
                        <div>
                            <h3 style="color: #667eea; margin-bottom: 5px;">📧 ${account.email}</h3>
                            <p style="color: #666; font-size: 13px;">Last reset: ${account.last_reset_date}</p>
                        </div>
                        <button class="delete-btn" onclick="deleteEmailAccount(${account.id})">🗑️ Delete</button>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                            <span style="font-weight: 600;">Sent Today:</span>
                            <span style="color: ${progressColor}; font-weight: bold;">${account.sent_today} / ${account.daily_limit}</span>
                        </div>
                        <div style="background: #e9ecef; height: 10px; border-radius: 5px; overflow: hidden;">
                            <div style="background: ${progressColor}; height: 100%; width: ${percentage}%; transition: width 0.3s;"></div>
                        </div>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 13px; color: #666;">
                        <span>Remaining: <strong>${account.remaining}</strong></span>
                        <span>Usage: <strong>${account.percentage_used}%</strong></span>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        
        emailAccountsList.innerHTML = html;
    } catch (error) {
        showAlert('error', 'Failed to load email accounts: ' + error.message);
    }
}

// Add new email account
addAccountBtn.addEventListener('click', async () => {
    const email = document.getElementById('newAccountEmail').value.trim();
    const password = document.getElementById('newAccountPassword').value.trim();
    const dailyLimit = document.getElementById('newAccountLimit').value;

    if (!email || !password) {
        showAlert('error', 'Email and password are required');
        return;
    }

    loading.style.display = 'block';
    addAccountBtn.disabled = true;

    try {
        const response = await fetch('/api/add-email-account/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                email: email,
                password: password,
                daily_limit: parseInt(dailyLimit)
            })
        });

        const data = await response.json();

        if (response.ok) {
            showAlert('success', data.message);
            document.getElementById('newAccountEmail').value = '';
            document.getElementById('newAccountPassword').value = '';
            document.getElementById('newAccountLimit').value = '450';
            loadEmailAccounts();
        } else {
            showAlert('error', data.error || 'Failed to add email account');
        }
    } catch (error) {
        showAlert('error', 'Network error: ' + error.message);
    } finally {
        loading.style.display = 'none';
        addAccountBtn.disabled = false;
    }
});

// Delete email account
window.deleteEmailAccount = async function(accountId) {
    if (!confirm('Are you sure you want to delete this email account?')) {
        return;
    }

    loading.style.display = 'block';

    try {
        const response = await fetch(`/api/delete-email-account/${accountId}/`, {
            method: 'DELETE'
        });

        const data = await response.json();

        if (response.ok) {
            showAlert('success', data.message);
            loadEmailAccounts();
        } else {
            showAlert('error', data.error || 'Failed to delete email account');
        }
    } catch (error) {
        showAlert('error', 'Network error: ' + error.message);
    } finally {
        loading.style.display = 'none';
    }
};

// Load email accounts on page load
loadEmailAccounts();
</script>
